<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Left broadcast arcs, centered at (50,50) -->
  <!-- Inner arc: r=25, spanning 120° around the leftmost point -->
  <path d="M 28,38 A 25,25 0 0,0 28,63"
        fill="none" stroke="black" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Outer arc: r=38 -->
  <path d="M 17,31 A 38,38 0 0,0 17,69"
        fill="none" stroke="black" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Right broadcast arcs (mirrored) -->
  <path d="M 72,38 A 25,25 0 0,1 72,63"
        fill="none" stroke="black" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M 83,31 A 38,38 0 0,1 83,69"
        fill="none" stroke="black" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Clock face -->
  <circle cx="50" cy="50" r="22"
          fill="none" stroke="black" stroke-width="5.5"/>

  <!-- Hour hand — pointing to 11 o'clock -->
  <line x1="50" y1="50" x2="43" y2="38"
        stroke="black" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Minute hand — pointing to 12 (straight up) -->
  <line x1="50" y1="50" x2="50" y2="31"
        stroke="black" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Center pivot -->
  <circle cx="50" cy="50" r="3.5" fill="black"/>

</svg>
