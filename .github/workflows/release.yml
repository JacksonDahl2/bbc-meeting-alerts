name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Homebrew dependencies
        run: brew install ffmpeg create-dmg

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync

      - name: Download BBC News jingle
        run: uv run python src/download_audio.py

      - name: Build app bundle
        run: uv run python setup.py py2app

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package DMG
        run: |
          create-dmg \
            --volname "BBC Alert" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "BBC Alert.app" 160 185 \
            --hide-extension "BBC Alert.app" \
            --app-drop-link 430 185 \
            "dist/BBC-Alert-${{ steps.version.outputs.VERSION }}.dmg" \
            "dist/BBC Alert.app"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "dist/BBC-Alert-${{ steps.version.outputs.VERSION }}.dmg" \
            --title "BBC Alert ${{ github.ref_name }}" \
            --generate-notes
